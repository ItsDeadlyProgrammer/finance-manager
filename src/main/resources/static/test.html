<!DOCTYPE html>
<html>
<head>
    <title>Finance Manager</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        h2 {
            text-align: center;
        }

        #expenses {
            margin-top: 20px;
        }

        .expense {
            background: #eee;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        #total {
            margin-top: 20px;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Personal Finance Manager</h2>
<p style="text-align:center;">
Track your daily expenses easily
</p>

    <input type="text" id="title" placeholder="Expense Title">
    <input type="number" id="amount" placeholder="Amount">
    <input type="text" id="category" placeholder="Category">

    <button onclick="addExpense()">Add Expense</button>

    <div id="total">Total: ₹0</div>

    <div id="expenses"></div>
</div>

<script>

async function loadExpenses() {

    const response = await fetch("http://localhost:8080/api/transactions")
    const data = await response.json()

    const expenseDiv = document.getElementById("expenses")
    expenseDiv.innerHTML = ""

    let total = 0

    data.forEach(expense => {

        total += expense.amount

        expenseDiv.innerHTML += `
    <div class="expense">
        <b>${expense.title}</b><br>
        ₹${expense.amount}<br>
        ${expense.category}<br><br>

        <button onclick="deleteExpense(${expense.id})">
            Delete
        </button>
    </div>
`
    })

    document.getElementById("total").innerText = "Total: ₹" + total
}

async function addExpense() {

    const title = document.getElementById("title").value
    const amount = document.getElementById("amount").value
    const category = document.getElementById("category").value

    await fetch("http://localhost:8080/api/transactions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: title,
            amount: parseDouble(amount),
            category: category
        })
    })

    loadExpenses()
}

async function deleteExpense(id) {

    await fetch(`http://localhost:8080/api/transactions/${id}`, {
        method: "DELETE"
    })

    loadExpenses()
}

function parseDouble(x){
    return Number(x)
}

loadExpenses()

</script>

</body>
</html>
